<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>BaloTV</title>

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="styles.css"
  >

  <!-- PWA -->

  <link
    rel="manifest"
    href="/manifest.json"
  >

  <meta
    name="theme-color"
    content="#000000"
  >

  <!-- FIREBASE -->

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

</head>

<body>

  <!-- TOPBAR -->

  <header class="topbar">

    <div class="left-top">

      <!-- MENU BUTTON -->

      <div
        class="menu-btn"
        id="menuBtn"
      >

        <span></span>
        <span></span>
        <span></span>

      </div>

      <!-- LOGO -->

      <div class="logo">

        <img
          src="balotv-logo.png"
          alt="BaloTV Logo"
        >

      </div>

    </div>

    <!-- SEARCH -->

    <div class="top-right">

      <input
        type="text"
        id="searchInput"
        placeholder="Search videos..."
      >

    </div>

  </header>

  <!-- DROPDOWN MENU -->

  <div
    class="dropdown-menu"
    id="dropdownMenu"
  >

    <a href="#">
      Home
    </a>

    <a href="#">
      Trending
    </a>

    <a href="#">
      My List
    </a>

    <a href="#">
      Settings
    </a>

  </div>

  <!-- MOBILE CATEGORY ROW -->

  <div class="mobile-categories">

    <button
      class="category-btn active"
      data-category="home"
    >
      Home
    </button>

    <button
      class="category-btn"
      data-category="talk"
    >
      Talk
    </button>

    <button
      class="category-btn"
      data-category="cartoons"
    >
      Cartoons
    </button>

    <button
      class="category-btn"
      data-category="musicvideos"
    >
      Music
    </button>

  </div>

  <!-- MAIN LAYOUT -->

  <div class="layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <h3>Browse</h3>

      <button
        class="category-btn active"
        data-category="home"
      >
        Home
      </button>

      <button
        class="category-btn"
        data-category="talk"
      >
        Talk Shows
      </button>

      <button
        class="category-btn"
        data-category="cartoons"
      >
        Cartoons
      </button>

      <button
        class="category-btn"
        data-category="musicvideos"
      >
        Music Videos
      </button>

    </aside>

    <!-- CONTENT -->

    <main class="content">

      <!-- PLAYER SECTION -->

      <section class="player-section">

        <div class="player-wrapper">

          <iframe
            id="video-player"
            src=""
            allowfullscreen
            allow="autoplay"
          ></iframe>

        </div>

        <!-- VIDEO INFO -->

        <div class="video-info">

          <h1 id="video-title">
            Welcome to BaloTV
          </h1>

          <p id="video-description">
            Select any video to start watching.
          </p>

        </div>

        <!-- PLAYER CONTROLS -->

        <div class="player-controls">

          <button id="prevBtn">
            ⏮ Previous
          </button>

          <button id="nextBtn">
            Next ⏭
          </button>

        </div>

      </section>

      <!-- UP NEXT -->

      <section class="section">

        <div class="section-title">

          <h2>Up Next</h2>

        </div>

        <div
          id="up-next-row"
          class="video-row"
        ></div>

      </section>

      <!-- CONTINUE WATCHING -->

      <section class="section">

        <div class="section-title">

          <h2>Continue Watching</h2>

        </div>

        <div
          id="row-continue"
          class="video-row"
        ></div>

      </section>

      <!-- HOME -->

      <section
        class="section category-section"
        id="section-home"
      >

        <div class="section-title">

          <h2>Home Videos</h2>

        </div>

        <div
          id="row-home"
          class="video-row"
        ></div>

      </section>

      <!-- TALK -->

      <section
        class="section category-section hidden"
        id="section-talk"
      >

        <div class="section-title">

          <h2>Talk Shows</h2>

        </div>

        <div
          id="row-talk"
          class="video-row"
        ></div>

      </section>

      <!-- CARTOONS -->

      <section
        class="section category-section hidden"
        id="section-cartoons"
      >

        <div class="section-title">

          <h2>Cartoons</h2>

        </div>

        <div
          id="row-cartoons"
          class="video-row"
        ></div>

      </section>

      <!-- MUSIC VIDEOS -->

      <section
        class="section category-section hidden"
        id="section-musicvideos"
      >

        <div class="section-title">

          <h2>Music Videos</h2>

        </div>

        <div
          id="row-musicvideos"
          class="video-row"
        ></div>

      </section>

    </main>

  </div>

  <!-- AUTH MODAL -->

  <div
    class="auth-modal hidden"
    id="authModal"
  >

    <div class="auth-box">

      <h2 id="authTitle">
        Login
      </h2>

      <input
        type="email"
        id="email"
        placeholder="Email"
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
      >

      <button id="authSubmit">
        Continue
      </button>

      <p id="switchAuth">
        Don't have an account? Register
      </p>

      <p id="forgotPassword">
        Forgot password?
      </p>

    </div>

  </div>

  <!-- APP JS -->

  <script src="app.js"></script>

</body>

</html>
