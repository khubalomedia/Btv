<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BaloTV</title>

<link rel="stylesheet" href="styles.css">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">

</head>

<body>






  <header class="topbar">

    <!-- HAMBURGER MENU -->
  
    <div class="menu-btn" onclick="toggleMenu()">
  
      <span></span>
      <span></span>
      <span></span>
  
    </div>
  
    <!-- DROPDOWN MENU -->
  
    <div class="dropdown-menu" id="dropdownMenu">
  
      <a href="index.html">Home</a>
  
      <a href="about.html">Why BaloTV</a>
  
      <a href="terms.html">Terms</a>
  
    </div>
  
    <div class="logo">
      <img src="balotv-logo.png" alt="BaloTV">
    </div>
  
    <div class="top-right">
      <input type="text" placeholder="Search..." id="searchInput">
    </div>
  
  </header>



<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>Categories</h3>

    <button class="category-btn active" data-category="home">
      Home
    </button>

    <button class="category-btn" data-category="talk">
      Talk Shows
    </button>

    <button class="category-btn" data-category="cartoons">
      Cartoons
    </button>

    <button class="category-btn" data-category="musicvideos">
      Music Videos
    </button>

  </aside>

  <!-- MAIN -->
  <main class="content">

    <!-- PLAYER -->
    <section id="player-section">
      <iframe
        id="video-player"
        src=""
        allowfullscreen
        allow="autoplay"
      ></iframe>


<!-- PLAYER CONTROLS -->

<div class="player-controls">

  <button id="prevBtn" class="control-btn">

    <span>⏮</span>

    Previous

  </button>

  <button id="nextBtn" class="control-btn next">

    Next

    <span>⏭</span>

  </button>


  <div class="video-info">

    <div class="video-meta">
  
      <div class="video-badge live-badge">
        ● NOW PLAYING
      </div>
  
      <div class="video-badge">
        BaloTV Stream
      </div>
  
    </div>
  
    <h1 id="video-title">
      Welcome to BaloTV
    </h1>
  
    <p id="video-description">
      Select any video to start watching.
    </p>
  
  </div>



  <!-- UP NEXT -->

  <section class="section">

    <div class="section-title">

      <h2>Up Next</h2>

    </div>

    <div
      id="up-next-row"
      class="video-row"
    ></div>

  </section>




        


    <!-- HOME -->
    <section class="section category-section" id="section-home">
      <h2>Home Videos</h2>
      <div id="row-home" class="video-grid"></div>
    </section>

    <!-- TALK -->
    <section class="section category-section hidden" id="section-talk">
      <h2>Talk Shows</h2>
      <div id="row-talk" class="video-grid"></div>
    </section>

    <!-- CARTOONS -->
    <section class="section category-section hidden" id="section-cartoons">
      <h2>Cartoons</h2>
      <div id="row-cartoons" class="video-grid"></div>
    </section>

    <!-- MUSIC VIDEOS -->
    <section class="section category-section hidden" id="section-musicvideos">
      <h2>Music Videos</h2>
      <div id="row-musicvideos" class="video-grid"></div>
    </section>


    
  </main>

</div>



<script>

  function toggleMenu(){
  
    document
    .getElementById("dropdownMenu")
    .classList
    .toggle("active");
  
  }
  
  </script>





<script src="app.js"></script>

</body>
</html>
