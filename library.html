<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BaloTV Library</title>

<link rel="stylesheet"
href="styles.css">

</head>

<body>

<!-- TOPBAR -->

<header class="topbar">

  <div class="menu-btn"
  onclick="toggleMenu()">

    <span></span>
    <span></span>
    <span></span>

  </div>

  <div class="dropdown-menu"
  id="dropdownMenu">

    <a href="index.html">
      Home
    </a>

    <a href="library.html">
      Library
    </a>

  </div>

  <div class="logo">

    <img src="balotv-logo.png">

  </div>

</header>

<!-- CONTENT -->

<main class="library-page">

  <!-- TALK SHOWS -->

  <section class="section">

    <h2>Talk Shows</h2>

    <div
      id="row-talk"
      class="video-row"
    ></div>

  </section>

  <!-- CARTOONS -->

  <section class="section">

    <h2>Cartoons</h2>

    <div
      id="row-cartoons"
      class="video-row"
    ></div>

  </section>

  <!-- MUSIC VIDEOS -->

  <section class="section">

    <h2>Music Videos</h2>

    <div
      id="row-musicvideos"
      class="video-row"
    ></div>

  </section>

</main>


<!-- MOBILE NAV -->

<div class="mobile-nav">

  <button
    class="mobile-nav-btn active"
    onclick="window.location.href='index.html'"
  >
    Home
  </button>

  <button
    class="mobile-nav-btn"
    onclick="window.location.href='library.html'"
  >
    Library
  </button>

  <button
    class="mobile-nav-btn"
    onclick="window.location.href='blog.html'"
  >
    Blog
  </button>

</div>




<script src="library.js"></script>

</body>

</html>
