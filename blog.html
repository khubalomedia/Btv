<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>BaloTV Feed</title>

<link rel="stylesheet" href="blog.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<header class="header">

<div class="logo">
BaloTV
</div>

</header>

<div class="feed-container">

<!-- CREATE POST -->

<div class="create-post">

<input
type="text"
id="username"
placeholder="Your name"
>

<textarea
id="content"
placeholder="What's happening on BaloTV?"
></textarea>

<input
type="file"
id="imageInput"
accept="image/*"
>

<button onclick="createPost()">
Post To Feed
</button>

</div>

<!-- POSTS -->

<div id="feed"></div>

<div
class="loading"
id="loading"
>
Loading feed...
</div>

</div>

<script src="blog.js"></script>

</body>
</html>
