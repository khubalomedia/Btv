<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>BaloTV Feed</title>

<link rel="stylesheet" href="blog.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<header class="header">

<h1 class="logo">
BaloTV
</h1>

</header>

<main class="container">

<!-- CREATE POST -->

<div class="create-post">

<input
type="text"
id="username"
placeholder="Your name"
>

<textarea
id="content"
placeholder="What's happening on BaloTV?"
></textarea>

<button id="postBtn">
Post
</button>

</div>

<!-- POSTS -->

<div id="posts"></div>

</main>

<script src="blog.js"></script>

</body>
</html>
