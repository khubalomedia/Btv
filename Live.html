<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>BaloTV Feed</title>

<link rel="stylesheet" href="Live.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<!-- TOPBAR -->

<header class="topbar">

  <div class="topbar-left">

    <!-- MENU -->

    <div class="menu-btn" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- LOGO -->

    <a href="index.html" class="logo">
      <img
        src="images/balotv-logo.png"
        alt="BaloTV"
      >
    </a>

  </div>

  <!-- AUTH BUTTONS -->

  <div class="header-actions">

    <div class="user-info">

      <img
        id="avatarPreview"
        src="images/default-avatar.png"
        alt="Profile"
        class="header-avatar"
      >
    
      <span
        id="userLabel"
        style="
        color:white;
        margin-right:10px;
        "
      >
        Guest
      </span>
    
    </div>
    
    <input
      type="file"
      id="avatarInput"
      accept="image/*"
      hidden
    >
    
    <button
      id="avatarBtn"
      class="header-btn"
      style="display:none;"
    >
      Photo
    </button>

    <button
      id="loginBtn"
      class="header-btn login-btn"
    >
      Login
    </button>

    <button
      id="registerBtn"
      class="header-btn register-btn"
    >
      Register
    </button>


  </div>

  <!-- DROPDOWN -->

  <div
    class="dropdown-menu"
    id="dropdownMenu"
  >

    <a href="index.html">
      Home
    </a>

    <a href="about.html">
      Submit Content
    </a>

    <a href="terms.html">
      Terms
    </a>

    <button
    id="editProfileBtn"
    class="header-btn"
    style="display:none;"
  >
    Edit Profile
  </button>

    <button
      id="logoutBtn"
      class="header-btn"
      style="display:none;"
    >
    
      Logout
    </button>


  </div>

</header>

<main>





</main>




</script>


<div id="authModal" class="auth-modal">

<div class="auth-box">

  <button id="closeAuth" class="close-auth">
    ×
  </button>

  <h2 id="authTitle">
    Login
  </h2>

  <input
    id="authUsername"
    type="text"
    placeholder="Username"
    style="display:none"
  >

  <input
    id="authEmail"
    type="email"
    placeholder="Email"
  >

  <input
    id="authPassword"
    type="password"
    placeholder="Password"
  >

  <button
    id="authSubmit"
    class="auth-submit"
  >
    Continue
  </button>

</div>

</div>



<script>
if("serviceWorker" in navigator){
  
  navigator.serviceWorker
  .register("/service-worker.js");

}

</script>



<div id="profileModal" class="auth-modal">

  <div class="auth-box">

    <button
      id="closeProfile"
      class="close-auth"
    >
      ×
    </button>

    <h2>
      Edit Profile
    </h2>

    <input
      id="newUsername"
      type="text"
      placeholder="New Username"
    >

    <input
      type="file"
      id="avatarUpload"
      accept="image/*"
    >

    <button
      id="saveProfileBtn"
      class="auth-submit"
    >
      Save Changes
    </button>

  </div>

</div>



<!-- BLOG SCRIPT -->

<script src="Live.js"></script>


<!-- MOBILE NAV -->

<div class="mobile-nav">

  <button
    class="mobile-nav-btn active"
    onclick="
      window.location.href='index.html'
    "
  >
    Home
  </button>

  <button
    class="mobile-nav-btn"
    onclick="
      window.location.href='library.html'
    "
  >
    Library
  </button>

  <button
    class="mobile-nav-btn"
    onclick="
      window.location.href='Live.html'
    "
  >
    Live
  </button>

</div>

</body>

</html>
